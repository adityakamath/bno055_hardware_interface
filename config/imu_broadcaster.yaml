controller_manager:
  ros__parameters:
    update_rate: 100  # Hz - Control loop frequency

    # IMU Sensor Broadcaster - Publishes sensor_msgs/Imu to /imu_sensor_broadcaster/imu
    imu_sensor_broadcaster:
      type: imu_sensor_broadcaster/IMUSensorBroadcaster

# IMU Sensor Broadcaster configuration
# Reads orientation, angular_velocity and linear_acceleration state interfaces
# and publishes sensor_msgs/Imu to /imu_sensor_broadcaster/imu at 100 Hz.
imu_sensor_broadcaster:
  ros__parameters:
    sensor_name: bno055       # Must match the <sensor name="..."> in the URDF ros2_control block
    frame_id: imu_frame       # TF frame for the published Imu messages

    # Static covariance matrices (row-major 3x3, diagonal — cross-correlations are zero).
    # Values derived from the BNO055 datasheet and typical noise density at 100 Hz.
    #
    # For IMUPLUS mode (no magnetometer), yaw drifts. Either:
    #   a) set orientation_covariance[0] = -1.0 to mark orientation unavailable (REP-145)
    #   b) set a large yaw variance in element [8], e.g. 1000.0
    #
    # Orientation: ±2° absolute accuracy (datasheet) → (0.035 rad)² ≈ 0.001 rad²
    static_covariance_orientation: [0.001, 0.0,   0.0,
                                     0.0,  0.001,  0.0,
                                     0.0,  0.0,   0.001]

    # Angular velocity: ~0.014 °/s/√Hz gyro noise @ 100 Hz → (~2.4e-4 rad/s)² ≈ 1e-5 rad²/s²
    static_covariance_angular_velocity: [1.0e-5, 0.0,    0.0,
                                          0.0,   1.0e-5,  0.0,
                                          0.0,   0.0,    1.0e-5]

    # Linear acceleration: ~150 µg/√Hz accel noise @ 100 Hz → (~0.015 m/s²)² ≈ 2e-4 m²/s⁴
    static_covariance_linear_acceleration: [2.0e-4, 0.0,    0.0,
                                             0.0,   2.0e-4,  0.0,
                                             0.0,   0.0,    2.0e-4]

    # Software rotation applied on top of the hardware axis_remap (Z-Y'-X'' / extrinsic RPY).
    # Use only for fine angular offsets that cannot be handled by axis_remap P0-P7.
    # Defaults to 0.0 (no rotation). Uncomment and set values to enable.
    # rotation_offset:
    #   roll:  0.0  # radians
    #   pitch: 0.0  # radians
    #   yaw:   0.0  # radians
